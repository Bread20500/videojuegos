<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caja Registradora - Videojuegos</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #333; text-align: center; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: .5rem; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background-color: #218838; }
        .result { margin-top: 1.5rem; padding: 15px; border-radius: 4px; background-color: #e9ecef; text-align: center; font-size: 1.2rem; }
        .logic-note { font-size: 0.8rem; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistema de Descuentos</h2>
    
    <div class="input-group">
        <label for="precio">Precio del Videojuego (Q):</label>
        <input type="number" id="precio" placeholder="Ej: 600" min="0">
    </div>

    <div class="input-group">
        <label for="vip">¿Es miembro VIP?</label>
        <select id="vip">
            <option value="no">No</option>
            <option value="si">Sí</option>
        </select>
    </div>

    <button onclick="calcularDescuento()">Calcular Precio Final</button>

    <div id="resultado" class="result" style="display:none;"></div>
    
    <div class="logic-note">
        <p><strong>Lógica aplicada:</strong><br>
        1. Si precio >= Q500: -10%<br>
        2. Si es VIP: -15% adicional sobre el precio actual.</p>
    </div>
</div>

<script>
    function calcularDescuento() {
        const precioOriginal = parseFloat(document.getElementById('precio').value);
        const esVIP = document.getElementById('vip').value;
        const divResultado = document.getElementById('resultado');

        if (isNaN(precioOriginal) || precioOriginal <= 0) {
            alert("Por favor, ingrese un precio válido.");
            return;
        }

        // Regla 1: Descuento por precio >= 500
        let precioFinal = precioOriginal;
        if (precioOriginal >= 500) {
            precioFinal = precioOriginal * 0.90;
        }

        // Regla 2: Descuento adicional VIP (15%)
        if (esVIP === "si") {
            precioFinal = precioFinal * 0.85;
        }

        // Mostrar resultado
        divResultado.style.display = "block";
        divResultado.innerHTML = `Total a pagar: <strong>Q${precioFinal.toFixed(2)}</strong>`;
    }
</script>

</body>
</html>
